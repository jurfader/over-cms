name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}

      - name: Build & push License Server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/license-server/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/license-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Portal image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/portal/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/portal:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          NEXT_PUBLIC_LICENSE_URL: https://${{ secrets.LICENSE_DOMAIN }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/overcms
            # Pull latest images
            docker compose -f docker-compose.prod.yml pull
            # Rolling restart (zero-downtime per service)
            docker compose -f docker-compose.prod.yml up -d --no-deps api
            docker compose -f docker-compose.prod.yml up -d --no-deps admin
            docker compose -f docker-compose.prod.yml up -d --no-deps license-server
            docker compose -f docker-compose.prod.yml up -d --no-deps portal
            # Remove old images
            docker image prune -f

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Checking API health..."
            curl -sf https://${{ secrets.API_DOMAIN }}/health || exit 1
            echo "All services healthy ✓"
